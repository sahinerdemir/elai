<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#0a0a0a"/>
  <!-- Concentric circles -->
  <circle cx="600" cy="300" r="280" stroke="#c8ff00" stroke-width="0.5" opacity="0.12"/>
  <circle cx="600" cy="300" r="220" stroke="#c8ff00" stroke-width="0.5" opacity="0.1"/>
  <circle cx="600" cy="300" r="160" stroke="#c8ff00" stroke-width="0.5" opacity="0.08"/>
  <circle cx="600" cy="300" r="100" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <circle cx="600" cy="300" r="40" stroke="#c8ff00" stroke-width="1" opacity="0.15"/>
  <!-- Off-center circles -->
  <circle cx="150" cy="100" r="120" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <circle cx="1050" cy="500" r="150" stroke="#c8ff00" stroke-width="0.5" opacity="0.08"/>
  <circle cx="200" cy="450" r="80" stroke="#c8ff00" stroke-width="0.5" opacity="0.06"/>
  <!-- Crossing lines through center -->
  <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="0.3" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="0.3" opacity="0.05"/>
  <line x1="200" y1="0" x2="1000" y2="600" stroke="#c8ff00" stroke-width="0.3" opacity="0.06"/>
  <line x1="1000" y1="0" x2="200" y2="600" stroke="#c8ff00" stroke-width="0.3" opacity="0.06"/>
  <!-- Small accent dots -->
  <circle cx="600" cy="300" r="5" fill="#c8ff00" opacity="0.2"/>
  <circle cx="380" cy="300" r="3" fill="#c8ff00" opacity="0.15"/>
  <circle cx="820" cy="300" r="3" fill="#c8ff00" opacity="0.15"/>
</svg>
