<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#0a0a0a"/>
  <!-- Triangles -->
  <polygon points="600,50 750,300 450,300" stroke="#c8ff00" stroke-width="0.8" opacity="0.15"/>
  <polygon points="600,100 720,280 480,280" stroke="#c8ff00" stroke-width="0.5" opacity="0.1"/>
  <polygon points="100,400 300,100 500,400" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <polygon points="800,500 950,200 1100,500" stroke="#c8ff00" stroke-width="0.5" opacity="0.08"/>
  <polygon points="200,550 350,350 500,550" stroke="#c8ff00" stroke-width="0.3" opacity="0.06"/>
  <polygon points="900,150 1000,50 1100,150" stroke="white" stroke-width="0.5" opacity="0.05"/>
  <!-- Motion lines -->
  <line x1="0" y1="350" x2="300" y2="350" stroke="#c8ff00" stroke-width="2" opacity="0.06"/>
  <line x1="50" y1="380" x2="250" y2="380" stroke="#c8ff00" stroke-width="1.5" opacity="0.05"/>
  <line x1="100" y1="410" x2="200" y2="410" stroke="#c8ff00" stroke-width="1" opacity="0.04"/>
  <line x1="900" y1="350" x2="1200" y2="350" stroke="#c8ff00" stroke-width="2" opacity="0.06"/>
  <line x1="950" y1="380" x2="1150" y2="380" stroke="#c8ff00" stroke-width="1.5" opacity="0.05"/>
  <!-- Play button -->
  <circle cx="600" cy="450" r="40" stroke="#c8ff00" stroke-width="0.8" opacity="0.1"/>
  <polygon points="590,430 590,470 620,450" fill="#c8ff00" opacity="0.08"/>
  <!-- Scattered small triangles -->
  <polygon points="50,50 70,20 90,50" fill="#c8ff00" opacity="0.06"/>
  <polygon points="1100,80 1120,50 1140,80" fill="#c8ff00" opacity="0.05"/>
  <polygon points="150,520 170,490 190,520" fill="white" opacity="0.04"/>
</svg>
